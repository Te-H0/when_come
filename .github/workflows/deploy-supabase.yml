name: Deploy Supabase (prod)

on:
  push:
    branches: [prod]
    paths:
      - 'when_come_be/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: when_come_be

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref kifxccvqofsdyonbhmnc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push DB migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets (runtime env)
        # DENO_ENV=production 을 Supabase 함수 시크릿으로 설정.
        # Edge Function 런타임에서 Deno.env.get("DENO_ENV") 로 읽히며,
        # _shared/error.ts isProduction() 이 true 를 반환해 운영 마스킹이 활성화된다.
        # (GitHub Actions env: 블록은 deploy 단계에만 영향 — 함수 런타임과 무관)
        run: supabase secrets set DENO_ENV=production --project-ref kifxccvqofsdyonbhmnc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
